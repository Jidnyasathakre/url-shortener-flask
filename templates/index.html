<!DOCTYPE html>
<html>
<head>
    <title>URL Shortener</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<div class="container mt-5">

    <h2 class="text-center">URL Shortener</h2>

    <form method="POST">

        <input type="text" name="url" class="form-control mt-3" placeholder="Enter URL" required>

        <button class="btn btn-primary mt-3 w-100">Shorten URL</button>

    </form>

    {% if short_url %}
    <div class="alert alert-success mt-3">
        Short URL:
        <input type="text" value="{{ short_url }}" class="form-control" id="shortUrl">

        <button onclick="copyUrl()" class="btn btn-success mt-2">Copy</button>
    </div>
    {% endif %}

    {% if error %}
    <div class="alert alert-danger mt-3">
        {{ error }}
    </div>
    {% endif %}

    <a href="/history" class="btn btn-secondary mt-3">View History</a>

</div>

<script>
function copyUrl() {
    var copyText = document.getElementById("shortUrl");
    copyText.select();
    document.execCommand("copy");
    alert("Copied!");
}
</script>

</body>
</html>
